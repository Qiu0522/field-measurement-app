<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 10;
      font-size: 13px;
    }

    #toolbar input[type="text"] {
      width: 80px;
      margin-right: 6px;
    }

    #drawingWrapper {
      overflow: auto;
      width: 100vw;
      height: calc(100vh - 70px);
      background: #f5f5f5;
    }

    #drawingArea {
      position: relative;
      display: inline-block;
      transform-origin: top left;
      margin: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    #drawing, #pdfCanvas {
      display: block;
    }

    .point {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      min-width: 20px;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }

    .blue { color: blue; }
    .red { color: red; }
    .green { color: green; }
    .purple { color: purple; }

    .done {
      background: transparent;
      border: none;
      outline: none;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">

    Blue name:
    <input type="text" id="blueName" value="Blue">

    Red name:
    <input type="text" id="redName" value="Red">

    Green name:
    <input type="text" id="greenName" value="Green">

    Purple name:
    <input type="text" id="purpleName" value="Purple">

    <select id="pointColor">
      <option value="blue">Blue</option>
      <option value="red">Red</option>
      <option value="green">Green</option>
      <option value="purple">Purple</option>
    </select>

    <button onclick="addPointMode()">Add Points</button>
    <button onclick="undo()">Undo</button>
    <button onclick="redo()">Redo</button>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportPDF()">Export PDF</button>

    <span id="status">Choose a PDF or image first.</span>
  </div>

  <div id="drawingWrapper">
    <div id="drawingArea">
      <img id="drawing" style="display:none;">
      <canvas id="pdfCanvas" style="display:none;"></canvas>
    </div>
  </div>

  <script>
    let points = [];
    let addingPoints = false;
    let zoomLevel = 1;

    let counters = {
      blue: 1,
      red: 1,
      green: 1,
      purple: 1
    };

    let undoStack = [];
    let redoStack = [];

    const fileInput = document.getElementById("fileInput");
    const drawing = document.getElementById("drawing");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const drawingArea = document.getElementById("drawingArea");
    const statusText = document.getElementById("status");
    const pointColorSelect = document.getElementById("pointColor");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      clearAll();

      if (file.type === "application/pdf") {
        loadPDF(file);
      } else if (file.type.startsWith("image/")) {
        loadImage(file);
      } else {
        alert("Please choose a PDF or image file.");
      }
    });

    function loadImage(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        drawing.src = e.target.result;
        drawing.style.display = "block";
        pdfCanvas.style.display = "none";
        statusText.textContent = "Image loaded. Click Add Points.";
      };

      reader.readAsDataURL(file);
    }

    function loadPDF(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise
          .then(pdf => pdf.getPage(1))
          .then(page => {
            const scale = 3;
            const viewport = page.getViewport({ scale: scale });

            const context = pdfCanvas.getContext("2d");
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;

            drawing.style.display = "none";
            pdfCanvas.style.display = "block";

            page.render({
              canvasContext: context,
              viewport: viewport
            });

            statusText.textContent = "PDF page 1 loaded. Click Add Points.";
          });
      };

      reader.readAsArrayBuffer(file);
    }

    function addPointMode() {
      addingPoints = true;
      statusText.textContent = "Add mode: tap drawing to add selected color points.";
    }

    drawingArea.addEventListener("click", function(event) {
      if (!addingPoints) return;
      if (event.target.classList.contains("point")) return;

      const rect = drawingArea.getBoundingClientRect();
      const x = (event.clientX - rect.left) / zoomLevel;
      const y = (event.clientY - rect.top) / zoomLevel;

      const color = pointColorSelect.value;
      const number = counters[color];

      const point = {
        uid: Date.now() + Math.random(),
        color: color,
        number: number,
        x: x,
        y: y,
        measurement: ""
      };

      points.push(point);
      counters[color]++;

      undoStack.push({ type: "add", point: point });
      redoStack = [];

      createPointElement(point);

      statusText.textContent = color + " point " + number + " added.";
    });

    function createPointElement(point) {
      const div = document.createElement("div");

      div.className = "point " + point.color;
      div.textContent = point.measurement || point.number;
      div.dataset.uid = point.uid;

      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      div.onclick = function(event) {
        event.stopPropagation();

        const oldValue = point.measurement;

        const value = prompt(
          "Enter measurement for " + point.color + " point " + point.number,
          point.measurement
        );

        if (value !== null) {
          point.measurement = value.trim();
          div.textContent = point.measurement || point.number;

          undoStack.push({
            type: "edit",
            point: point,
            oldValue: oldValue,
            newValue: point.measurement
          });

          redoStack = [];
        }
      };

      drawingArea.appendChild(div);
    }

    function undo() {
      const action = undoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
        counters[action.point.color]--;
      }

      if (action.type === "edit") {
        action.point.measurement = action.oldValue;
        updatePointElement(action.point);
      }

      redoStack.push(action);
    }

    function redo() {
      const action = redoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points.push(action.point);
        counters[action.point.color]++;
        createPointElement(action.point);
      }

      if (action.type === "edit") {
        action.point.measurement = action.newValue;
        updatePointElement(action.point);
      }

      undoStack.push(action);
    }

    function removePointElement(uid) {
      const element = document.querySelector(`[data-uid="${uid}"]`);
      if (element) element.remove();
    }

    function updatePointElement(point) {
      const element = document.querySelector(`[data-uid="${point.uid}"]`);
      if (!element) return;

      element.textContent = point.measurement || point.number;
    }

    function zoomIn() {
      zoomLevel += 0.1;
      applyZoom();
    }

    function zoomOut() {
      if (zoomLevel > 0.3) {
        zoomLevel -= 0.1;
        applyZoom();
      }
    }

    function applyZoom() {
      drawingArea.style.transform = "scale(" + zoomLevel + ")";
      statusText.textContent = "Zoom: " + Math.round(zoomLevel * 100) + "%";
    }

    function getCategoryName(color) {
      const input = document.getElementById(color + "Name");
      return input ? input.value || color : color;
    }

    function cleanCSV(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function exportCSV() {
      let fileName = prompt("Enter CSV file name:", "measurements");
      if (!fileName) return;

      if (!fileName.endsWith(".csv")) {
        fileName += ".csv";
      }

      const colors = ["blue", "red", "green", "purple"];

      const grouped = {
        blue: [],
        red: [],
        green: [],
        purple: []
      };

      points.forEach(p => {
        grouped[p.color].push(p);
      });

      const maxRows = Math.max(
        grouped.blue.length,
        grouped.red.length,
        grouped.green.length,
        grouped.purple.length
      );

      let headers = [];

      colors.forEach(color => {
        const name = getCategoryName(color);
        headers.push(name + " Seq");
        headers.push(name + " Measurement");
      });

      let csv = headers.map(cleanCSV).join(",") + "\n";

      for (let i = 0; i < maxRows; i++) {
        const row = [];

        colors.forEach(color => {
          const p = grouped[color][i];

          if (p) {
            row.push(p.number);
            row.push(p.measurement);
          } else {
            row.push("");
            row.push("");
          }
        });

        csv += row.map(cleanCSV).join(",") + "\n";
      }

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }

    function exportPDF() {
      let fileName = prompt("Enter PDF file name:", "marked_drawing");
      if (!fileName) return;

      if (!fileName.endsWith(".pdf")) {
        fileName += ".pdf";
      }

      const originalTransform = drawingArea.style.transform;
      drawingArea.style.transform = "scale(1)";

      const options = {
        margin: 0,
        filename: fileName,
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 4 },
        jsPDF: {
          unit: "px",
          format: [drawingArea.offsetWidth, drawingArea.offsetHeight],
          orientation: drawingArea.offsetWidth > drawingArea.offsetHeight ? "landscape" : "portrait"
        }
      };

      html2pdf().set(options).from(drawingArea).save().then(() => {
        drawingArea.style.transform = originalTransform;
      });
    }

    function clearAll() {
      points = [];

      counters = {
        blue: 1,
        red: 1,
        green: 1,
        purple: 1
      };

      undoStack = [];
      redoStack = [];
      zoomLevel = 1;
      drawingArea.style.transform = "scale(1)";

      document.querySelectorAll(".point").forEach(p => p.remove());
    }
  </script>

</body>
</html>

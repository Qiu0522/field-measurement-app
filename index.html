<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      overflow: hidden;
    }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 100;
      font-size: 13px;
      line-height: 28px;
      border-bottom: 1px solid #ccc;
    }

    button, select, input {
      margin: 2px;
      font-size: 13px;
    }

    details {
      display: inline-block;
      vertical-align: top;
      margin-left: 8px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    .dataRow {
      display: block;
      margin: 4px 0;
      background: #f8f8f8;
      padding: 4px;
      border-radius: 4px;
    }

    .dataRow input[type="text"] {
      width: 110px;
    }

    #drawingWrapper {
      overflow: auto;
      width: 100vw;
      height: calc(100vh - 95px);
      background: #f5f5f5;
      touch-action: none;
    }

    #drawingArea {
      position: relative;
      display: inline-block;
      transform-origin: top left;
      margin: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    #drawing, #pdfCanvas, #commentCanvas {
      display: block;
    }

    #commentCanvas {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 5;
      pointer-events: none;
    }

    .commentMode #commentCanvas {
      pointer-events: auto;
      cursor: crosshair;
    }

    .point {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      min-width: 20px;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      user-select: none;
      z-index: 10;
    }

    .point.selected {
      text-decoration: underline;
      background: rgba(255,255,0,0.35);
    }

    #status {
      margin-left: 10px;
      font-weight: bold;
    }

    #contextMenu {
      position: fixed;
      display: none;
      background: white;
      border: 1px solid #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 999;
      padding: 4px;
    }

    #contextMenu button {
      display: block;
      width: 140px;
      text-align: left;
      background: white;
      border: none;
      padding: 8px;
    }

    #contextMenu button:hover {
      background: #eee;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">

    Work File:
    <input type="text" id="workName" value="Project_Level" style="width:120px;">
    <button onclick="saveWork()">Save</button>
    <button onclick="loadWork()">Load</button>

    <details>
      <summary>Add Data</summary>
      <div id="dataList"></div>
      <button onclick="addDataType()">+ Add Data Type</button>
    </details>

    Select Data:
    <select id="dataSelect"></select>

    <button onclick="setMode('add')">Add Points</button>
    <button onclick="setMode('edit')">🔒 Edit / Lock</button>
    <button onclick="setMode('comment')">Comment</button>

    Pen:
    <input type="color" id="penColor" value="#ff0000">
    Size:
    <input type="range" id="penSize" min="1" max="12" value="3">
    <button onclick="setPenMode()">Pen</button>
    <button onclick="setEraserMode()">Eraser</button>
    <button onclick="clearComments()">Clear Comments</button>

    <button onclick="undo()" title="Undo">↶</button>
    <button onclick="redo()" title="Redo">↷</button>

    <button onclick="zoomIn()">＋</button>
    <button onclick="zoomOut()">－</button>

    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportPDF()">Export PDF</button>

    <span id="status">Choose a PDF or image first.</span>
  </div>

  <div id="drawingWrapper">
    <div id="drawingArea">
      <img id="drawing" style="display:none;">
      <canvas id="pdfCanvas" style="display:none;"></canvas>
      <canvas id="commentCanvas"></canvas>
    </div>
  </div>

  <div id="contextMenu">
    <button onclick="contextEdit()">Edit Measurement</button>
    <button onclick="contextMove()">Move Point</button>
    <button onclick="contextDelete()">Delete Point</button>
  </div>

  <script>
    let points = [];
    let mode = "edit";
    let zoomLevel = 1;
    let movingPoint = null;
    let contextPoint = null;
    let currentFileName = "";

    let isDrawingComment = false;
    let lastCommentX = 0;
    let lastCommentY = 0;
    let commentImageData = "";
    let commentTool = "pen";

    let suppressNextClick = false;

    let pinchStartDistance = null;
    let pinchStartZoom = 1;
    let activeTouches = new Map();

    let dataTypes = [
      { id: "data1", name: "Blue", color: "#0066ff", counter: 1, export: true },
      { id: "data2", name: "Red", color: "#ff0000", counter: 1, export: true },
      { id: "data3", name: "Green", color: "#00aa00", counter: 1, export: true },
      { id: "data4", name: "Purple", color: "#8000ff", counter: 1, export: true }
    ];

    let undoStack = [];
    let redoStack = [];

    const fileInput = document.getElementById("fileInput");
    const drawing = document.getElementById("drawing");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const commentCanvas = document.getElementById("commentCanvas");
    const drawingArea = document.getElementById("drawingArea");
    const drawingWrapper = document.getElementById("drawingWrapper");
    const statusText = document.getElementById("status");
    const dataSelect = document.getElementById("dataSelect");
    const dataList = document.getElementById("dataList");
    const contextMenu = document.getElementById("contextMenu");
    const workNameInput = document.getElementById("workName");
    const penColor = document.getElementById("penColor");
    const penSize = document.getElementById("penSize");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    renderDataControls();
    setMode("edit");

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      currentFileName = file.name;
      workNameInput.value = file.name.replace(/\.[^/.]+$/, "");
      clearAllPoints();

      if (file.type === "application/pdf") loadPDF(file);
      else if (file.type.startsWith("image/")) loadImage(file);
      else alert("Please choose a PDF or image file.");
    });

    function loadImage(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        drawing.onload = function() {
          setupCommentCanvas(drawing.naturalWidth, drawing.naturalHeight);
        };

        drawing.src = e.target.result;
        drawing.style.display = "block";
        pdfCanvas.style.display = "none";
        statusText.textContent = "Image loaded.";
      };

      reader.readAsDataURL(file);
    }

    function loadPDF(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise
          .then(pdf => pdf.getPage(1))
          .then(page => {
            const scale = 5;
            const viewport = page.getViewport({ scale });

            const context = pdfCanvas.getContext("2d");
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;

            drawing.style.display = "none";
            pdfCanvas.style.display = "block";

            page.render({ canvasContext: context, viewport });

            setupCommentCanvas(viewport.width, viewport.height);
            statusText.textContent = "PDF page 1 loaded. High clarity mode.";
          });
      };

      reader.readAsArrayBuffer(file);
    }

    function setupCommentCanvas(width, height) {
      commentCanvas.width = width;
      commentCanvas.height = height;
      commentCanvas.style.width = width + "px";
      commentCanvas.style.height = height + "px";

      if (commentImageData) {
        const img = new Image();
        img.onload = function() {
          commentCanvas.getContext("2d").drawImage(img, 0, 0);
        };
        img.src = commentImageData;
      }
    }

    function renderDataControls() {
      dataList.innerHTML = "";
      dataSelect.innerHTML = "";

      dataTypes.forEach(dt => {
        const row = document.createElement("div");
        row.className = "dataRow";

        row.innerHTML = `
          Export:
          <input type="checkbox" ${dt.export ? "checked" : ""} onchange="toggleExport('${dt.id}', this.checked)">
          Name:
          <input type="text" value="${dt.name}" onchange="renameDataType('${dt.id}', this.value)">
          Color:
          <input type="color" value="${dt.color}" onchange="changeDataColor('${dt.id}', this.value)">
        `;

        dataList.appendChild(row);

        const option = document.createElement("option");
        option.value = dt.id;
        option.textContent = dt.name;
        dataSelect.appendChild(option);
      });

      refreshPointStyles();
    }

    function addDataType() {
      dataTypes.push({
        id: "data" + Date.now(),
        name: "New Data",
        color: "#000000",
        counter: 1,
        export: true
      });

      renderDataControls();
      autoSave();
    }

    function toggleExport(id, checked) {
      const dt = getDataType(id);
      if (dt) dt.export = checked;
      refreshPointStyles();
      autoSave();
    }

    function renameDataType(id, newName) {
      const dt = getDataType(id);
      if (!dt) return;
      dt.name = newName || "Unnamed";
      renderDataControls();
      autoSave();
    }

    function changeDataColor(id, newColor) {
      const dt = getDataType(id);
      if (!dt) return;
      dt.color = newColor;
      refreshPointStyles();
      autoSave();
    }

    function getDataType(id) {
      return dataTypes.find(dt => dt.id === id);
    }

    function setMode(newMode) {
      mode = newMode;
      movingPoint = null;
      contextMenu.style.display = "none";

      drawingArea.classList.toggle("commentMode", mode === "comment");
      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));

      if (mode === "add") statusText.textContent = "Add mode: tap blank drawing area to add points. Tap points to edit.";
      if (mode === "edit") statusText.textContent = "Locked edit mode: tapping blank area will NOT add points. Tap point to edit. Right click / long press for Move or Delete.";
      if (mode === "comment") statusText.textContent = "Comment mode: draw notes with mouse or Apple Pencil. Use Pen/Eraser.";
    }

    drawingArea.addEventListener("click", function(event) {
      if (suppressNextClick) {
        suppressNextClick = false;
        return;
      }

      if (event.target.classList.contains("point")) return;
      if (mode === "comment") return;

      const rect = drawingArea.getBoundingClientRect();
      const x = (event.clientX - rect.left) / zoomLevel;
      const y = (event.clientY - rect.top) / zoomLevel;

      if (movingPoint) {
        movePoint(movingPoint, x, y);
        movingPoint = null;
        setMode("edit");
        return;
      }

      if (mode === "add") {
        addPoint(x, y);
      }
    });

    function addPoint(x, y) {
      const dataId = dataSelect.value;
      const dt = getDataType(dataId);
      if (!dt) return;

      const point = {
        uid: Date.now() + Math.random(),
        dataId,
        number: dt.counter,
        x,
        y,
        measurement: "",
        moved: false,
        moveDistance: 0
      };

      points.push(point);
      dt.counter++;

      undoStack.push({ type: "add", point });
      redoStack = [];

      createPointElement(point);
      statusText.textContent = dt.name + " point " + point.number + " added.";
      autoSave();
    }

    function createPointElement(point) {
      const div = document.createElement("div");

      div.className = "point";
      div.dataset.uid = point.uid;
      div.textContent = point.measurement || point.number;
      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      const dt = getDataType(point.dataId);
      div.style.color = dt ? dt.color : "black";
      div.style.display = dt && dt.export ? "block" : "none";

      div.onclick = function(event) {
        event.stopPropagation();
        if (mode !== "comment") editPoint(point);
      };

      div.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        showContextMenu(event.clientX, event.clientY, point);
      };

      let pressTimer = null;

      div.addEventListener("touchstart", function(event) {
        pressTimer = setTimeout(() => {
          suppressNextClick = true;
          const touch = event.touches[0];
          showContextMenu(touch.clientX, touch.clientY, point);
        }, 650);
      }, { passive: true });

      div.addEventListener("touchend", function() {
        clearTimeout(pressTimer);
      });

      div.addEventListener("touchmove", function() {
        clearTimeout(pressTimer);
      });

      drawingArea.appendChild(div);
    }

    function showContextMenu(x, y, point) {
      contextPoint = point;
      contextMenu.style.left = x + "px";
      contextMenu.style.top = y + "px";
      contextMenu.style.display = "block";
    }

    document.addEventListener("click", function(event) {
      if (!contextMenu.contains(event.target)) {
        contextMenu.style.display = "none";
      }
    });

    function contextEdit() {
      contextMenu.style.display = "none";
      if (contextPoint) editPoint(contextPoint);
    }

    function contextMove() {
      contextMenu.style.display = "none";
      if (!contextPoint) return;

      movingPoint = contextPoint;
      mode = "edit";

      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));
      const element = document.querySelector(`[data-uid="${contextPoint.uid}"]`);
      if (element) element.classList.add("selected");

      statusText.textContent = "Move selected point: tap the new location. Blank tap will move, NOT add new point.";
    }

    function contextDelete() {
      contextMenu.style.display = "none";
      if (contextPoint) deletePoint(contextPoint);
    }

    function editPoint(point) {
      const oldValue = point.measurement;
      const value = prompt("Enter measurement for point " + point.number, point.measurement);

      if (value !== null) {
        point.measurement = value.trim();

        undoStack.push({
          type: "edit",
          point,
          oldValue,
          newValue: point.measurement
        });

        redoStack = [];
        updatePointElement(point);
        autoSave();
      }
    }

    function movePoint(point, newX, newY) {
      const oldX = point.x;
      const oldY = point.y;

      const distance = Math.sqrt(Math.pow(newX - oldX, 2) + Math.pow(newY - oldY, 2));

      point.x = newX;
      point.y = newY;
      point.moved = true;
      point.moveDistance += distance;

      undoStack.push({
        type: "move",
        point,
        oldX,
        oldY,
        newX,
        newY,
        distance
      });

      redoStack = [];
      updatePointElement(point);
      statusText.textContent = "Point moved. CSV will include warning if moved too far.";
      autoSave();
    }

    function deletePoint(point) {
      if (!confirm("Delete this point?")) return;

      points = points.filter(p => p.uid !== point.uid);
      removePointElement(point.uid);

      undoStack.push({ type: "delete", point });
      redoStack = [];

      statusText.textContent = "Point deleted.";
      autoSave();
    }

    function updatePointElement(point) {
      const element = document.querySelector(`[data-uid="${point.uid}"]`);
      if (!element) return;

      const dt = getDataType(point.dataId);

      element.textContent = point.measurement || point.number;
      element.style.left = point.x + "px";
      element.style.top = point.y + "px";
      element.style.color = dt ? dt.color : "black";
      element.style.display = dt && dt.export ? "block" : "none";
      element.classList.remove("selected");
    }

    function removePointElement(uid) {
      const element = document.querySelector(`[data-uid="${uid}"]`);
      if (element) element.remove();
    }

    function refreshPointStyles() {
      points.forEach(updatePointElement);
    }

    function undo() {
      const action = undoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter--;
      }

      if (action.type === "edit") {
        action.point.measurement = action.oldValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.oldX;
        action.point.y = action.oldY;
        action.point.moveDistance = Math.max(0, action.point.moveDistance - action.distance);
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points.push(action.point);
        createPointElement(action.point);
      }

      redoStack.push(action);
      autoSave();
    }

    function redo() {
      const action = redoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points.push(action.point);
        createPointElement(action.point);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter++;
      }

      if (action.type === "edit") {
        action.point.measurement = action.newValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.newX;
        action.point.y = action.newY;
        action.point.moved = true;
        action.point.moveDistance += action.distance;
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
      }

      undoStack.push(action);
      autoSave();
    }

    function zoomIn() {
      zoomLevel += 0.1;
      applyZoom();
    }

    function zoomOut() {
      if (zoomLevel > 0.3) {
        zoomLevel -= 0.1;
        applyZoom();
      }
    }

    function applyZoom() {
      drawingArea.style.transform = "scale(" + zoomLevel + ")";
      statusText.textContent = "Zoom: " + Math.round(zoomLevel * 100) + "%";
    }

    drawingWrapper.addEventListener("wheel", function(event) {
      if (!event.ctrlKey && !event.metaKey) return;

      event.preventDefault();

      if (event.deltaY < 0) {
        zoomLevel += 0.1;
      } else if (zoomLevel > 0.3) {
        zoomLevel -= 0.1;
      }

      applyZoom();
    }, { passive: false });

    drawingWrapper.addEventListener("pointerdown", function(event) {
      activeTouches.set(event.pointerId, event);
      if (activeTouches.size === 2) {
        const touches = Array.from(activeTouches.values());
        pinchStartDistance = getPointerDistance(touches[0], touches[1]);
        pinchStartZoom = zoomLevel;
      }
    });

    drawingWrapper.addEventListener("pointermove", function(event) {
      if (!activeTouches.has(event.pointerId)) return;

      activeTouches.set(event.pointerId, event);

      if (activeTouches.size === 2 && pinchStartDistance) {
        const touches = Array.from(activeTouches.values());
        const currentDistance = getPointerDistance(touches[0], touches[1]);
        zoomLevel = Math.max(0.3, Math.min(5, pinchStartZoom * (currentDistance / pinchStartDistance)));
        applyZoom();
      }
    });

    drawingWrapper.addEventListener("pointerup", function(event) {
      activeTouches.delete(event.pointerId);
      if (activeTouches.size < 2) pinchStartDistance = null;
    });

    drawingWrapper.addEventListener("pointercancel", function(event) {
      activeTouches.delete(event.pointerId);
      if (activeTouches.size < 2) pinchStartDistance = null;
    });

    function getPointerDistance(a, b) {
      return Math.sqrt(Math.pow(a.clientX - b.clientX, 2) + Math.pow(a.clientY - b.clientY, 2));
    }

    function cleanCSV(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function exportCSV() {
      let fileName = prompt("Enter CSV file name:", workNameInput.value || "measurements");
      if (!fileName) return;
      if (!fileName.endsWith(".csv")) fileName += ".csv";

      const exportTypes = dataTypes.filter(dt => dt.export);
      const grouped = {};
      exportTypes.forEach(dt => grouped[dt.id] = []);

      points.forEach(p => {
        if (grouped[p.dataId]) grouped[p.dataId].push(p);
      });

      const maxRows = Math.max(...exportTypes.map(dt => grouped[dt.id].length), 0);

      let headers = [];
      exportTypes.forEach(dt => {
        headers.push(dt.name + " Seq");
        headers.push(dt.name + " Measurement");
        headers.push(dt.name + " Warning");
      });

      let csv = headers.map(cleanCSV).join(",") + "\n";

      for (let i = 0; i < maxRows; i++) {
        const row = [];

        exportTypes.forEach(dt => {
          const p = grouped[dt.id][i];

          if (p) {
            row.push(p.number);
            row.push(p.measurement);

            if (p.moveDistance > 80) {
              row.push("WARNING: " + dt.name + " seq " + p.number + " moved a large distance, check data order");
            } else if (p.moved) {
              row.push("Point moved");
            } else {
              row.push("");
            }
          } else {
            row.push("");
            row.push("");
            row.push("");
          }
        });

        csv += row.map(cleanCSV).join(",") + "\n";
      }

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }

    function exportPDF() {
      let fileName = prompt("Enter PDF file name:", workNameInput.value || "marked_drawing");
      if (!fileName) return;
      if (!fileName.endsWith(".pdf")) fileName += ".pdf";

      const originalTransform = drawingArea.style.transform;
      drawingArea.style.transform = "scale(1)";

      const options = {
        margin: 0,
        filename: fileName,
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 4 },
        jsPDF: {
          unit: "px",
          format: [drawingArea.offsetWidth, drawingArea.offsetHeight],
          orientation: drawingArea.offsetWidth > drawingArea.offsetHeight ? "landscape" : "portrait"
        }
      };

      html2pdf().set(options).from(drawingArea).save().then(() => {
        drawingArea.style.transform = originalTransform;
      });
    }

    function setPenMode() {
      commentTool = "pen";
      statusText.textContent = "Comment tool: Pen";
    }

    function setEraserMode() {
      commentTool = "eraser";
      statusText.textContent = "Comment tool: Eraser";
    }

    commentCanvas.addEventListener("pointerdown", function(event) {
      if (mode !== "comment") return;

      event.preventDefault();
      commentCanvas.setPointerCapture(event.pointerId);

      isDrawingComment = true;
      const pos = getCanvasPos(event);
      lastCommentX = pos.x;
      lastCommentY = pos.y;
    });

    commentCanvas.addEventListener("pointermove", function(event) {
      if (!isDrawingComment || mode !== "comment") return;

      event.preventDefault();

      const pos = getCanvasPos(event);
      const ctx = commentCanvas.getContext("2d");

      ctx.lineWidth = Number(penSize.value);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (commentTool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = Number(penSize.value) * 4;
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = penColor.value;
      }

      ctx.beginPath();
      ctx.moveTo(lastCommentX, lastCommentY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();

      lastCommentX = pos.x;
      lastCommentY = pos.y;
    });

    commentCanvas.addEventListener("pointerup", function() {
      if (isDrawingComment) {
        isDrawingComment = false;
        commentImageData = commentCanvas.toDataURL();
        autoSave();
      }
    });

    commentCanvas.addEventListener("pointerleave", function() {
      if (isDrawingComment) {
        isDrawingComment = false;
        commentImageData = commentCanvas.toDataURL();
        autoSave();
      }
    });

    function getCanvasPos(event) {
      const rect = commentCanvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) / zoomLevel,
        y: (event.clientY - rect.top) / zoomLevel
      };
    }

    function clearComments() {
      if (!confirm("Clear all comments?")) return;

      const ctx = commentCanvas.getContext("2d");
      ctx.clearRect(0, 0, commentCanvas.width, commentCanvas.height);
      commentImageData = "";
      autoSave();
    }

    function getWorkKey() {
      return "fieldMeasurement_" + (workNameInput.value || "default");
    }

    function saveWork() {
      const data = {
        points,
        dataTypes,
        currentFileName,
        commentImageData
      };

      localStorage.setItem(getWorkKey(), JSON.stringify(data));
      statusText.textContent = "Saved: " + workNameInput.value;
    }

    function autoSave() {
      try {
        const data = {
          points,
          dataTypes,
          currentFileName,
          commentImageData
        };
        localStorage.setItem(getWorkKey(), JSON.stringify(data));
      } catch (e) {
        console.warn("Auto save failed", e);
      }
    }

    function loadWork() {
      const raw = localStorage.getItem(getWorkKey());

      if (!raw) {
        alert("No saved work found for: " + workNameInput.value);
        return;
      }

      const data = JSON.parse(raw);

      clearAllPoints();

      points = data.points || [];
      dataTypes = data.dataTypes || dataTypes;
      currentFileName = data.currentFileName || "";
      commentImageData = data.commentImageData || "";

      renderDataControls();
      points.forEach(createPointElement);

      if (commentImageData && commentCanvas.width > 0) {
        const img = new Image();
        img.onload = function() {
          commentCanvas.getContext("2d").drawImage(img, 0, 0);
        };
        img.src = commentImageData;
      }

      statusText.textContent = "Loaded saved work. Open the same PDF/image if drawing is blank.";
    }

    function clearAllPoints() {
      points = [];
      undoStack = [];
      redoStack = [];
      movingPoint = null;
      zoomLevel = 1;
      drawingArea.style.transform = "scale(1)";
      dataTypes.forEach(dt => dt.counter = 1);
      document.querySelectorAll(".point").forEach(p => p.remove());

      if (commentCanvas.width > 0) {
        const ctx = commentCanvas.getContext("2d");
        ctx.clearRect(0, 0, commentCanvas.width, commentCanvas.height);
      }

      commentImageData = "";
    }
  </script>

</body>
</html>

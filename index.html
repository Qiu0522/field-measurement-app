<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body { font-family: Arial; margin: 0; overflow: hidden; }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 100;
      font-size: 13px;
      line-height: 28px;
      border-bottom: 1px solid #ccc;
    }

    button, select, input { margin: 2px; font-size: 13px; }

    button {
      background: #f2f2f2;
      border: 1px solid #999;
      border-radius: 4px;
      padding: 3px 8px;
    }

    .activeTool {
      background: #666 !important;
      color: white !important;
      border: 2px solid #333 !important;
      font-weight: bold;
    }

    #drawingWrapper {
      overflow: auto;
      width: 100vw;
      height: calc(100vh - 95px);
      background: #f5f5f5;
      touch-action: pan-x pan-y pinch-zoom;
    }

    #drawingArea {
      position: relative;
      display: inline-block;
      transform-origin: top left;
      margin: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    #drawing, #pdfCanvas, #commentCanvas { display: block; }

    #commentCanvas {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 5;
      pointer-events: none;
    }

    .drawActive #commentCanvas {
      pointer-events: auto;
      cursor: crosshair;
      touch-action: none;
    }

    .point {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      min-width: 20px;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      user-select: none;
      z-index: 10;
      touch-action: none;
    }

    .point.selected {
      text-decoration: underline;
      background: rgba(255,255,0,0.35);
    }

    #status { margin-left: 10px; font-weight: bold; }

    #contextMenu {
      position: fixed;
      display: none;
      background: white;
      border: 1px solid #aaa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 999;
      padding: 4px;
    }

    #contextMenu button {
      display: block;
      width: 160px;
      text-align: left;
      background: white;
      border: none;
      padding: 8px;
    }

    #contextMenu button:hover { background: #eee; }

    #measurementModal {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border: 1px solid #999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      z-index: 2000;
      padding: 14px;
      width: 320px;
      border-radius: 8px;
    }

    #measurementInput {
      width: 95%;
      font-size: 24px;
      padding: 8px;
      margin-bottom: 8px;
      text-align: center;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .keypad button {
      font-size: 18px;
      padding: 10px;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">

    Select Data:
    <select id="dataSelect" onchange="handleDataSelectChange()"></select>

    <button id="addBtn" onclick="setPointMode('add')">Add Points</button>
    <button id="lockBtn" onclick="setPointMode('lock')">🔒 Lock Points</button>
    <button id="previewBtn" onclick="finishCurrentData()">Finish Data / Preview Order</button>

    <button onclick="setPenMode()" id="penBtn">✏️</button>
    <button onclick="setEraserMode()" id="eraserBtn" title="Eraser">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4L20 11L11 20"/>
        <path d="M6 11L13 18"/>
      </svg>
    </button>

    <button onclick="undo()" title="Undo">⟲</button>
    <button onclick="redo()" title="Redo">⟳</button>

    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportPDF()">Export PDF</button>

    <span id="status">Choose a PDF or image first.</span>
  </div>

  <div id="drawingWrapper">
    <div id="drawingArea">
      <img id="drawing" style="display:none;">
      <canvas id="pdfCanvas" style="display:none;"></canvas>
      <canvas id="commentCanvas"></canvas>
    </div>
  </div>

  <div id="contextMenu">
    <button onclick="contextEdit()">Edit Measurement</button>
    <button onclick="contextMove()">Move Point</button>
    <button onclick="contextAssignSide()">Assign Side</button>
    <button onclick="contextDelete()">Delete Point</button>
  </div>

  <div id="measurementModal">
    <div id="modalTitle" style="font-weight:bold; margin-bottom:8px;">Enter Measurement</div>
    <input id="measurementInput" type="text" inputmode="decimal" autocomplete="off">

    <div class="keypad">
      <button onclick="addKey('7')">7</button>
      <button onclick="addKey('8')">8</button>
      <button onclick="addKey('9')">9</button>
      <button onclick="backspaceKey()">⌫</button>

      <button onclick="addKey('4')">4</button>
      <button onclick="addKey('5')">5</button>
      <button onclick="addKey('6')">6</button>
      <button onclick="addKey(' ')">Space</button>

      <button onclick="addKey('1')">1</button>
      <button onclick="addKey('2')">2</button>
      <button onclick="addKey('3')">3</button>
      <button onclick="addKey('/')">/</button>

      <button onclick="addKey('0')">0</button>
      <button onclick="addKey('.')">.</button>
      <button onclick="clearMeasurement()">Clear</button>
      <button onclick="confirmMeasurement()">OK</button>

      <button onclick="addKey('1/8')">1/8</button>
      <button onclick="addKey('1/4')">1/4</button>
      <button onclick="addKey('3/8')">3/8</button>
      <button onclick="addKey('1/2')">1/2</button>

      <button onclick="addKey('5/8')">5/8</button>
      <button onclick="addKey('3/4')">3/4</button>
      <button onclick="addKey('7/8')">7/8</button>
      <button onclick="cancelMeasurement()">Cancel</button>
    </div>
  </div>

  <script>
    let points = [];
    let pointMode = "lock";
    let zoomLevel = 1;
    let movingPoint = null;
    let contextPoint = null;
    let currentFileName = "";

    let isDrawingComment = false;
    let lastCommentX = 0;
    let lastCommentY = 0;
    let commentImageData = "";
    let commentTool = "none";
    let commentBeforeStroke = "";

    let suppressNextClick = false;
    let isDraggingPoint = false;
    let draggedPoint = null;
    let dragStartX = 0;
    let dragStartY = 0;

    let measurementCallback = null;
    let exportDirection = "clockwise";

    let dataTypes = [
      { id: "data1", name: "测量落差", color: "#0066ff", counter: 1, export: true },
      { id: "data2", name: "Embed 距离", color: "#ff0000", counter: 1, export: true },
      { id: "data3", name: "二次测量Embed距离", color: "#00aa00", counter: 1, export: true },
      { id: "data4", name: "完成后立柱测量尺寸", color: "#8000ff", counter: 1, export: true }
    ];

    let undoStack = [];
    let redoStack = [];

    const fileInput = document.getElementById("fileInput");
    const drawing = document.getElementById("drawing");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const commentCanvas = document.getElementById("commentCanvas");
    const drawingArea = document.getElementById("drawingArea");
    const drawingWrapper = document.getElementById("drawingWrapper");
    const statusText = document.getElementById("status");
    const dataSelect = document.getElementById("dataSelect");
    const contextMenu = document.getElementById("contextMenu");
    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const addBtn = document.getElementById("addBtn");
    const lockBtn = document.getElementById("lockBtn");
    const previewBtn = document.getElementById("previewBtn");
    const measurementModal = document.getElementById("measurementModal");
    const measurementInput = document.getElementById("measurementInput");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    renderDataControls();
    setPointMode("lock");

    measurementInput.addEventListener("input", function() {
      measurementInput.value = measurementInput.value.replace(/[^0-9./\-\s]/g, "");
    });

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      currentFileName = file.name;
      clearAllPoints();

      if (file.type === "application/pdf") loadPDF(file);
      else if (file.type.startsWith("image/")) loadImage(file);
      else alert("Please choose a PDF or image file.");
    });

    function loadImage(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        drawing.onload = function() {
          setupCommentCanvas(drawing.naturalWidth, drawing.naturalHeight);
        };

        drawing.src = e.target.result;
        drawing.style.display = "block";
        pdfCanvas.style.display = "none";
        statusText.textContent = "Image loaded.";
      };

      reader.readAsDataURL(file);
    }

    function loadPDF(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise
          .then(pdf => pdf.getPage(1))
          .then(page => {
            const scale = 5;
            const viewport = page.getViewport({ scale });

            const context = pdfCanvas.getContext("2d");
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;

            drawing.style.display = "none";
            pdfCanvas.style.display = "block";

            page.render({ canvasContext: context, viewport });

            setupCommentCanvas(viewport.width, viewport.height);
            statusText.textContent = "PDF page 1 loaded. Add points, then preview order.";
          });
      };

      reader.readAsArrayBuffer(file);
    }

    function setupCommentCanvas(width, height) {
      commentCanvas.width = width;
      commentCanvas.height = height;
      commentCanvas.style.width = width + "px";
      commentCanvas.style.height = height + "px";

      if (commentImageData) restoreCommentImage(commentImageData);
    }

    function renderDataControls() {
      dataSelect.innerHTML = "";

      dataTypes.forEach(dt => {
        const option = document.createElement("option");
        option.value = dt.id;
        option.textContent = dt.name;
        dataSelect.appendChild(option);
      });

      const addOption = document.createElement("option");
      addOption.value = "__add_data_type__";
      addOption.textContent = "+ Add Data Type";
      dataSelect.appendChild(addOption);

      refreshPointStyles();
    }

    function handleDataSelectChange() {
      if (dataSelect.value !== "__add_data_type__") return;

      const name = prompt("Enter new data type name:", "New Data");
      if (!name) {
        dataSelect.value = dataTypes[0].id;
        return;
      }

      const color = prompt("Enter color hex code:", "#000000") || "#000000";

      const newType = {
        id: "data" + Date.now(),
        name: name,
        color: color,
        counter: 1,
        export: true
      };

      dataTypes.push(newType);
      renderDataControls();
      dataSelect.value = newType.id;
      autoSave();
    }

    function getDataType(id) {
      return dataTypes.find(dt => dt.id === id);
    }

    function updateToolButtons() {
      addBtn.classList.remove("activeTool");
      lockBtn.classList.remove("activeTool");
      previewBtn.classList.remove("activeTool");
      penBtn.classList.remove("activeTool");
      eraserBtn.classList.remove("activeTool");

      if (pointMode === "add") addBtn.classList.add("activeTool");
      if (pointMode === "lock") lockBtn.classList.add("activeTool");
      if (commentTool === "pen") penBtn.classList.add("activeTool");
      if (commentTool === "eraser") eraserBtn.classList.add("activeTool");
    }

    function setPointMode(newMode) {
      pointMode = newMode;
      movingPoint = null;
      contextMenu.style.display = "none";
      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));

      if (pointMode === "add") statusText.textContent = "Add Points on. Tap drawing, enter measurement, then point is created.";
      if (pointMode === "lock") statusText.textContent = "Lock Points on. Blank tap will not add points.";

      updateToolButtons();
    }

    function setPenMode() {
      setCommentTool(commentTool === "pen" ? "none" : "pen");
    }

    function setEraserMode() {
      setCommentTool(commentTool === "eraser" ? "none" : "eraser");
    }

    function setCommentTool(tool) {
      commentTool = tool;
      drawingArea.classList.toggle("drawActive", tool !== "none");

      if (tool === "pen") statusText.textContent = "Pen active.";
      if (tool === "eraser") statusText.textContent = "Eraser active.";
      if (tool === "none") {
        if (pointMode === "add") statusText.textContent = "Add Points on. Tap drawing to enter measurement.";
        if (pointMode === "lock") statusText.textContent = "Lock Points on. Blank tap will not add points.";
      }

      updateToolButtons();
    }

    drawingArea.addEventListener("click", function(event) {
      if (suppressNextClick) {
        suppressNextClick = false;
        return;
      }

      if (event.target.classList.contains("point")) return;
      if (commentTool !== "none") return;

      const pos = getDrawingPos(event);

      if (movingPoint) {
        movePoint(movingPoint, pos.x, pos.y);
        movingPoint = null;
        setPointMode("lock");
        return;
      }

      if (pointMode === "add") {
        openMeasurementModal("", function(value) {
          if (value.trim() !== "") {
            addPoint(pos.x, pos.y, value.trim());
          }
        });
      }
    });

    function addPoint(x, y, measurement) {
      const dataId = dataSelect.value;
      const dt = getDataType(dataId);
      if (!dt) return;

      const point = {
        uid: Date.now() + Math.random(),
        dataId,
        number: dt.counter,
        x,
        y,
        measurement: measurement || "",
        moved: false,
        moveDistance: 0,
        manualSide: "",
        previewSide: "",
        previewSeq: ""
      };

      points.push(point);
      dt.counter++;

      undoStack.push({ type: "add", point });
      redoStack = [];

      createPointElement(point);
      statusText.textContent = dt.name + " point added: " + point.measurement;
      autoSave();
    }

    function createPointElement(point) {
      const div = document.createElement("div");

      div.className = "point";
      div.dataset.uid = point.uid;
      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      const dt = getDataType(point.dataId);
      div.style.color = dt ? dt.color : "black";
      div.style.display = dt && dt.export ? "block" : "none";

      div.onclick = function(event) {
        event.stopPropagation();
        if (!isDraggingPoint && commentTool === "none") editPoint(point);
      };

      div.oncontextmenu = function(event) {
        event.preventDefault();
        event.stopPropagation();
        showContextMenu(event.clientX, event.clientY, point);
      };

      div.addEventListener("pointerdown", function(event) {
        if (movingPoint !== point) return;

        event.preventDefault();
        event.stopPropagation();

        isDraggingPoint = true;
        draggedPoint = point;
        dragStartX = point.x;
        dragStartY = point.y;
        div.setPointerCapture(event.pointerId);
      });

      div.addEventListener("pointermove", function(event) {
        if (!isDraggingPoint || draggedPoint !== point) return;

        event.preventDefault();
        const pos = getDrawingPos(event);

        point.x = pos.x;
        point.y = pos.y;
        point.moved = true;
        updatePointElement(point);
      });

      div.addEventListener("pointerup", function(event) {
        if (!isDraggingPoint || draggedPoint !== point) return;

        event.preventDefault();

        const newX = point.x;
        const newY = point.y;
        const distance = Math.sqrt(Math.pow(newX - dragStartX, 2) + Math.pow(newY - dragStartY, 2));

        isDraggingPoint = false;
        draggedPoint = null;
        movingPoint = null;

        point.moveDistance += distance;

        undoStack.push({
          type: "move",
          point,
          oldX: dragStartX,
          oldY: dragStartY,
          newX,
          newY,
          distance
        });

        redoStack = [];
        setPointMode("lock");
        autoSave();
      });

      let pressTimer = null;

      div.addEventListener("touchstart", function(event) {
        pressTimer = setTimeout(() => {
          suppressNextClick = true;
          const touch = event.touches[0];
          showContextMenu(touch.clientX, touch.clientY, point);
        }, 650);
      }, { passive: true });

      div.addEventListener("touchend", function() {
        clearTimeout(pressTimer);
      });

      div.addEventListener("touchmove", function() {
        clearTimeout(pressTimer);
      });

      drawingArea.appendChild(div);
      updatePointElement(point);
    }

    function openMeasurementModal(initialValue, callback) {
      measurementInput.value = initialValue || "";
      measurementCallback = callback;
      measurementModal.style.display = "block";
      setTimeout(() => measurementInput.focus(), 50);
    }

    function addKey(key) {
      measurementInput.value += key;
      measurementInput.focus();
    }

    function backspaceKey() {
      measurementInput.value = measurementInput.value.slice(0, -1);
      measurementInput.focus();
    }

    function clearMeasurement() {
      measurementInput.value = "";
      measurementInput.focus();
    }

    function confirmMeasurement() {
      const value = measurementInput.value;
      measurementModal.style.display = "none";
      if (measurementCallback) measurementCallback(value);
      measurementCallback = null;
    }

    function cancelMeasurement() {
      measurementModal.style.display = "none";
      measurementCallback = null;
    }

    function editPoint(point) {
      const oldValue = point.measurement;

      openMeasurementModal(point.measurement, function(value) {
        point.measurement = value.trim();

        undoStack.push({
          type: "edit",
          point,
          oldValue,
          newValue: point.measurement
        });

        redoStack = [];
        updatePointElement(point);
        autoSave();
      });
    }

    function getDrawingPos(event) {
      const rect = drawingArea.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) / zoomLevel,
        y: (event.clientY - rect.top) / zoomLevel
      };
    }

    function showContextMenu(x, y, point) {
      contextPoint = point;
      contextMenu.style.left = x + "px";
      contextMenu.style.top = y + "px";
      contextMenu.style.display = "block";
    }

    document.addEventListener("click", function(event) {
      if (!contextMenu.contains(event.target)) contextMenu.style.display = "none";
    });

    function contextEdit() {
      contextMenu.style.display = "none";
      if (contextPoint) editPoint(contextPoint);
    }

    function contextMove() {
      contextMenu.style.display = "none";
      if (!contextPoint) return;

      movingPoint = contextPoint;
      setCommentTool("none");

      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));
      const element = document.querySelector(`[data-uid="${contextPoint.uid}"]`);
      if (element) element.classList.add("selected");

      statusText.textContent = "Move selected point: drag it with one finger/mouse.";
      updateToolButtons();
    }

    function contextAssignSide() {
      contextMenu.style.display = "none";
      if (!contextPoint) return;

      const side = prompt("Assign side: N, E, S, or W", contextPoint.manualSide || contextPoint.previewSide || "");

      if (!side) return;

      const cleanSide = side.trim().toUpperCase();

      if (!["N", "E", "S", "W"].includes(cleanSide)) {
        alert("Please enter only N, E, S, or W.");
        return;
      }

      contextPoint.manualSide = cleanSide;
      contextPoint.previewSide = cleanSide;
      updatePointElement(contextPoint);
      autoSave();
    }

    function contextDelete() {
      contextMenu.style.display = "none";
      if (contextPoint) deletePoint(contextPoint);
    }

    function movePoint(point, newX, newY) {
      const oldX = point.x;
      const oldY = point.y;
      const distance = Math.sqrt(Math.pow(newX - oldX, 2) + Math.pow(newY - oldY, 2));

      point.x = newX;
      point.y = newY;
      point.moved = true;
      point.moveDistance += distance;

      undoStack.push({
        type: "move",
        point,
        oldX,
        oldY,
        newX,
        newY,
        distance
      });

      redoStack = [];
      updatePointElement(point);
      autoSave();
    }

    function deletePoint(point) {
      if (!confirm("Delete this point?")) return;

      points = points.filter(p => p.uid !== point.uid);
      removePointElement(point.uid);

      undoStack.push({ type: "delete", point });
      redoStack = [];

      statusText.textContent = "Point deleted.";
      autoSave();
    }

    function updatePointElement(point) {
      const element = document.querySelector(`[data-uid="${point.uid}"]`);
      if (!element) return;

      const dt = getDataType(point.dataId);

      let label = point.measurement || point.number;

      if (point.previewSide && point.previewSeq) {
        label = point.previewSide + point.previewSeq + " " + (point.measurement || "");
      }

      element.textContent = label;
      element.style.left = point.x + "px";
      element.style.top = point.y + "px";
      element.style.color = dt ? dt.color : "black";
      element.style.display = dt && dt.export ? "block" : "none";
    }

    function removePointElement(uid) {
      const element = document.querySelector(`[data-uid="${uid}"]`);
      if (element) element.remove();
    }

    function refreshPointStyles() {
      points.forEach(updatePointElement);
    }

    function finishCurrentData() {
      const dataId = dataSelect.value;
      const dt = getDataType(dataId);

      if (!dt) return;

      const direction = prompt(
        "Export order? Type clockwise or counterclockwise:",
        exportDirection
      );

      if (!direction) return;

      const cleanDirection = direction.trim().toLowerCase();

      if (!["clockwise", "counterclockwise"].includes(cleanDirection)) {
        alert("Please type clockwise or counterclockwise.");
        return;
      }

      exportDirection = cleanDirection;

      const ordered = getOrderedPointsForData(dataId, exportDirection);

      ordered.forEach(item => {
        item.point.previewSide = item.side;
        item.point.previewSeq = item.seq;
        updatePointElement(item.point);
      });

      statusText.textContent = dt.name + " previewed as " + exportDirection + ". Long-press point → Assign Side if needed.";
    }

    function getOrderedPointsForData(dataId, direction) {
      const pts = points.filter(p => p.dataId === dataId);

      if (pts.length === 0) return [];

      const groups = groupPointsByPerimeterSides(pts);

      if (direction === "clockwise") {
        groups.N.sort((a, b) => a.x - b.x);
        groups.E.sort((a, b) => a.y - b.y);
        groups.S.sort((a, b) => b.x - a.x);
        groups.W.sort((a, b) => b.y - a.y);

        return buildOrderedList(groups, ["N", "E", "S", "W"]);
      }

      if (direction === "counterclockwise") {
        groups.N.sort((a, b) => b.x - a.x);
        groups.W.sort((a, b) => a.y - b.y);
        groups.S.sort((a, b) => a.x - b.x);
        groups.E.sort((a, b) => b.y - a.y);

        return buildOrderedList(groups, ["N", "W", "S", "E"]);
      }

      return [];
    }

    function groupPointsByPerimeterSides(pts) {
      const groups = { N: [], E: [], S: [], W: [] };

      const manualPts = [];
      const autoPts = [];

      pts.forEach(p => {
        if (p.manualSide && groups[p.manualSide]) {
          groups[p.manualSide].push(p);
          manualPts.push(p);
        } else {
          autoPts.push(p);
        }
      });

      if (autoPts.length === 0) return groups;

      const hull = convexHull(autoPts);

      const xs = autoPts.map(p => p.x);
      const ys = autoPts.map(p => p.y);
      const center = {
        x: (Math.min(...xs) + Math.max(...xs)) / 2,
        y: (Math.min(...ys) + Math.max(...ys)) / 2
      };

      autoPts.forEach(p => {
        const side = guessSideFromHull(p, hull, center);
        groups[side].push(p);
      });

      return groups;
    }

    function convexHull(pointsList) {
      const pts = pointsList
        .map(p => ({ x: p.x, y: p.y }))
        .sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);

      if (pts.length <= 3) return pts;

      function cross(o, a, b) {
        return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
      }

      const lower = [];
      for (const p of pts) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], p) <= 0) {
          lower.pop();
        }
        lower.push(p);
      }

      const upper = [];
      for (let i = pts.length - 1; i >= 0; i--) {
        const p = pts[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], p) <= 0) {
          upper.pop();
        }
        upper.push(p);
      }

      upper.pop();
      lower.pop();

      return lower.concat(upper);
    }

    function guessSideFromHull(point, hull, center) {
      if (hull.length < 2) {
        return guessSideByBoundingBox(point, [point]);
      }

      let bestEdge = null;

      for (let i = 0; i < hull.length; i++) {
        const a = hull[i];
        const b = hull[(i + 1) % hull.length];

        const result = distanceToSegment(point.x, point.y, a.x, a.y, b.x, b.y);

        if (!bestEdge || result.distance < bestEdge.distance) {
          bestEdge = {
            a,
            b,
            distance: result.distance
          };
        }
      }

      const midX = (bestEdge.a.x + bestEdge.b.x) / 2;
      const midY = (bestEdge.a.y + bestEdge.b.y) / 2;
      const dx = bestEdge.b.x - bestEdge.a.x;
      const dy = bestEdge.b.y - bestEdge.a.y;

      if (Math.abs(dx) >= Math.abs(dy)) {
        return midY < center.y ? "N" : "S";
      } else {
        return midX > center.x ? "E" : "W";
      }
    }

    function guessSideByBoundingBox(point, pts) {
      const xs = pts.map(p => p.x);
      const ys = pts.map(p => p.y);

      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);

      const distances = {
        N: Math.abs(point.y - minY),
        E: Math.abs(point.x - maxX),
        S: Math.abs(point.y - maxY),
        W: Math.abs(point.x - minX)
      };

      let bestSide = "N";
      let bestDistance = distances.N;

      Object.keys(distances).forEach(side => {
        if (distances[side] < bestDistance) {
          bestSide = side;
          bestDistance = distances[side];
        }
      });

      return bestSide;
    }

    function distanceToSegment(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const lenSq = dx * dx + dy * dy;

      let t = 0;
      if (lenSq !== 0) {
        t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
      }

      const closestX = x1 + t * dx;
      const closestY = y1 + t * dy;

      const dist = Math.sqrt(Math.pow(px - closestX, 2) + Math.pow(py - closestY, 2));

      return { distance: dist, t };
    }

    function buildOrderedList(groups, sideOrder) {
      const result = [];

      sideOrder.forEach(side => {
        groups[side].forEach((point, index) => {
          result.push({
            point: point,
            side: side,
            seq: index + 1
          });
        });
      });

      return result;
    }

    function undo() {
      const action = undoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter--;
      }

      if (action.type === "edit") {
        action.point.measurement = action.oldValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.oldX;
        action.point.y = action.oldY;
        action.point.moveDistance = Math.max(0, action.point.moveDistance - action.distance);
        action.point.moved = action.point.moveDistance > 0;
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points.push(action.point);
        createPointElement(action.point);
      }

      if (action.type === "comment") {
        restoreCommentImage(action.before);
      }

      redoStack.push(action);
      autoSave();
    }

    function redo() {
      const action = redoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points.push(action.point);
        createPointElement(action.point);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter++;
      }

      if (action.type === "edit") {
        action.point.measurement = action.newValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.newX;
        action.point.y = action.newY;
        action.point.moved = true;
        action.point.moveDistance += action.distance;
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
      }

      if (action.type === "comment") {
        restoreCommentImage(action.after);
      }

      undoStack.push(action);
      autoSave();
    }

    drawingWrapper.addEventListener("wheel", function(event) {
      if (!event.ctrlKey && !event.metaKey) return;

      event.preventDefault();

      if (event.deltaY < 0) zoomLevel += 0.1;
      else if (zoomLevel > 0.3) zoomLevel -= 0.1;

      applyZoom();
    }, { passive: false });

    function applyZoom() {
      drawingArea.style.transform = "scale(" + zoomLevel + ")";
      statusText.textContent = "Zoom: " + Math.round(zoomLevel * 100) + "%";
    }

    function cleanCSV(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function exportCSV() {
      let direction = prompt(
        "Export order? Type clockwise or counterclockwise:",
        exportDirection
      );

      if (!direction) return;

      direction = direction.trim().toLowerCase();

      if (!["clockwise", "counterclockwise"].includes(direction)) {
        alert("Please type clockwise or counterclockwise.");
        return;
      }

      exportDirection = direction;

      let fileName = prompt("Enter CSV file name:", "measurements");
      if (!fileName) return;
      if (!fileName.endsWith(".csv")) fileName += ".csv";

      const exportTypes = dataTypes.filter(dt => dt.export);

      const grouped = {};

      exportTypes.forEach(dt => {
        grouped[dt.id] = getOrderedPointsForData(dt.id, exportDirection);
      });

      const maxRows = Math.max(...exportTypes.map(dt => grouped[dt.id].length), 0);

      let headers = [];

      exportTypes.forEach(dt => {
        headers.push(dt.name + " Side");
        headers.push(dt.name + " Seq");
        headers.push(dt.name + " Measurement");
        headers.push(dt.name + " Warning");
      });

      let csv = headers.map(cleanCSV).join(",") + "\n";

      for (let i = 0; i < maxRows; i++) {
        const row = [];

        exportTypes.forEach(dt => {
          const item = grouped[dt.id][i];

          if (item) {
            const p = item.point;

            row.push(item.side);
            row.push(item.seq);
            row.push(p.measurement);

            let warning = "";

            if (p.manualSide) {
              warning = "Manual side assigned";
            } else if (p.moveDistance > 80) {
              warning = "Point moved a large distance, check order";
            } else if (p.moved) {
              warning = "Point moved";
            }

            row.push(warning);
          } else {
            row.push("");
            row.push("");
            row.push("");
            row.push("");
          }
        });

        csv += row.map(cleanCSV).join(",") + "\n";
      }

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }

    function exportPDF() {
      let fileName = prompt("Enter PDF file name:", "marked_drawing");
      if (!fileName) return;
      if (!fileName.endsWith(".pdf")) fileName += ".pdf";

      const originalTransform = drawingArea.style.transform;
      drawingArea.style.transform = "scale(1)";

      const options = {
        margin: 0,
        filename: fileName,
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 4 },
        jsPDF: {
          unit: "px",
          format: [drawingArea.offsetWidth, drawingArea.offsetHeight],
          orientation: drawingArea.offsetWidth > drawingArea.offsetHeight ? "landscape" : "portrait"
        }
      };

      html2pdf().set(options).from(drawingArea).save().then(() => {
        drawingArea.style.transform = originalTransform;
      });
    }

    commentCanvas.addEventListener("pointerdown", function(event) {
      if (commentTool === "none") return;

      event.preventDefault();
      commentCanvas.setPointerCapture(event.pointerId);

      commentBeforeStroke = commentCanvas.toDataURL();
      isDrawingComment = true;

      const pos = getCanvasPos(event);
      lastCommentX = pos.x;
      lastCommentY = pos.y;
    });

    commentCanvas.addEventListener("pointermove", function(event) {
      if (!isDrawingComment || commentTool === "none") return;

      event.preventDefault();

      const pos = getCanvasPos(event);
      const ctx = commentCanvas.getContext("2d");

      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (commentTool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.lineWidth = 30;
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = "#ff0000";
        ctx.lineWidth = 5;
      }

      ctx.beginPath();
      ctx.moveTo(lastCommentX, lastCommentY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();

      lastCommentX = pos.x;
      lastCommentY = pos.y;
    });

    commentCanvas.addEventListener("pointerup", finishCommentStroke);
    commentCanvas.addEventListener("pointerleave", finishCommentStroke);

    function finishCommentStroke() {
      if (!isDrawingComment) return;

      isDrawingComment = false;
      const after = commentCanvas.toDataURL();

      undoStack.push({
        type: "comment",
        before: commentBeforeStroke,
        after
      });

      redoStack = [];
      commentImageData = after;
      autoSave();
    }

    function getCanvasPos(event) {
      const rect = commentCanvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) / zoomLevel,
        y: (event.clientY - rect.top) / zoomLevel
      };
    }

    function restoreCommentImage(dataURL) {
      const ctx = commentCanvas.getContext("2d");
      ctx.clearRect(0, 0, commentCanvas.width, commentCanvas.height);

      if (!dataURL) {
        commentImageData = "";
        return;
      }

      const img = new Image();
      img.onload = function() {
        ctx.drawImage(img, 0, 0);
        commentImageData = dataURL;
      };
      img.src = dataURL;
    }

    function getWorkKey() {
      return "fieldMeasurement_" + (currentFileName || "default");
    }

    function autoSave() {
      try {
        const data = {
          points,
          dataTypes,
          currentFileName,
          commentImageData,
          exportDirection
        };

        localStorage.setItem(getWorkKey(), JSON.stringify(data));
      } catch (e) {
        console.warn("Auto save failed", e);
      }
    }

    function clearAllPoints() {
      points = [];
      undoStack = [];
      redoStack = [];
      movingPoint = null;
      zoomLevel = 1;
      drawingArea.style.transform = "scale(1)";
      dataTypes.forEach(dt => dt.counter = 1);
      document.querySelectorAll(".point").forEach(p => p.remove());

      if (commentCanvas.width > 0) {
        const ctx = commentCanvas.getContext("2d");
        ctx.clearRect(0, 0, commentCanvas.width, commentCanvas.height);
      }

      commentImageData = "";
      updateToolButtons();
    }
  </script>

</body>

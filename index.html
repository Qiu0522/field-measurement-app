<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #drawingArea {
      position: relative;
      width: 1200px;
    }

    #drawing {
      width: 1200px;
      display: block;
    }

    .point {
      position: absolute;
      width: 24px;
      height: 24px;
      background: red;
      border-radius: 50%;
      color: white;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      cursor: pointer;
    }

    .done {
      background: green;
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <button onclick="addPointMode()">Add Points</button>
    <button onclick="exportCSV()">Export CSV</button>
    <span id="status">Click Add Points to start.</span>
  </div>

  <div id="drawingArea">
    <img id="drawing" src="drawing.png">
  </div>

  <script>
    let points = [];
    let addingPoints = false;
    let nextPointId = 1;

    const drawingArea = document.getElementById("drawingArea");
    const statusText = document.getElementById("status");

    function addPointMode() {
      addingPoints = true;
      statusText.textContent = "Tap drawing to add points.";
    }

    drawingArea.addEventListener("click", function(event) {
      if (!addingPoints) return;

      const rect = drawingArea.getBoundingClientRect();
      const x = event.clientX - rect.left + drawingArea.scrollLeft;
      const y = event.clientY - rect.top + drawingArea.scrollTop;

      const point = {
        id: nextPointId,
        x: x,
        y: y,
        measurement: ""
      };

      points.push(point);
      createPointElement(point);
      nextPointId++;
    });

    function createPointElement(point) {
      const div = document.createElement("div");
      div.className = "point";
      div.textContent = point.id;
      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      div.onclick = function(event) {
        event.stopPropagation();
        const value = prompt("Enter measurement for point " + point.id, point.measurement);
        if (value !== null) {
          point.measurement = value;
          div.classList.add("done");
        }
      };

      drawingArea.appendChild(div);
    }

    function exportCSV() {
      let csv = "Sequence,Measurement\n";

      points.forEach(p => {
        csv += p.id + "," + p.measurement + "\n";
      });

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "measurements.csv";
      a.click();
    }
  </script>
</body>
</html>

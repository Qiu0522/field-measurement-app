<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 10;
      font-size: 13px;
      line-height: 28px;
    }

    button, select, input {
      margin: 2px;
      font-size: 13px;
    }

    details {
      display: inline-block;
      vertical-align: top;
      margin-left: 8px;
    }

    summary {
      cursor: pointer;
      font-weight: bold;
    }

    .dataRow {
      display: block;
      margin: 4px 0;
      background: #f8f8f8;
      padding: 4px;
      border-radius: 4px;
    }

    .dataRow input[type="text"] {
      width: 110px;
    }

    #drawingWrapper {
      overflow: auto;
      width: 100vw;
      height: calc(100vh - 90px);
      background: #f5f5f5;
    }

    #drawingArea {
      position: relative;
      display: inline-block;
      transform-origin: top left;
      margin: 10px;
      border: 1px solid #ccc;
      background: white;
    }

    #drawing, #pdfCanvas {
      display: block;
    }

    .point {
      position: absolute;
      background: transparent;
      border: none;
      outline: none;
      padding: 0;
      min-width: 20px;
      text-align: center;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      user-select: none;
    }

    .point.selected {
      text-decoration: underline;
    }

    #status {
      margin-left: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">

    <details>
      <summary>Add Data</summary>
      <div id="dataList"></div>
      <button onclick="addDataType()">+ Add Data Type</button>
    </details>

    Select Data:
    <select id="dataSelect"></select>

    <button onclick="setMode('add')">Add Points</button>
    <button onclick="setMode('edit')">Select/Edit</button>
    <button onclick="setMode('move')">Move</button>
    <button onclick="setMode('delete')">Delete</button>

    <button onclick="undo()" title="Undo">↶</button>
    <button onclick="redo()" title="Redo">↷</button>

    <button onclick="zoomIn()">＋</button>
    <button onclick="zoomOut()">－</button>

    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="exportPDF()">Export PDF</button>

    <span id="status">Choose a PDF or image first.</span>
  </div>

  <div id="drawingWrapper">
    <div id="drawingArea">
      <img id="drawing" style="display:none;">
      <canvas id="pdfCanvas" style="display:none;"></canvas>
    </div>
  </div>

  <script>
    let points = [];
    let mode = "edit";
    let zoomLevel = 1;
    let selectedPoint = null;
    let movingPoint = null;

    let dataTypes = [
      { id: "data1", name: "Blue", color: "#0066ff", counter: 1 },
      { id: "data2", name: "Red", color: "#ff0000", counter: 1 },
      { id: "data3", name: "Green", color: "#00aa00", counter: 1 },
      { id: "data4", name: "Purple", color: "#8000ff", counter: 1 }
    ];

    let undoStack = [];
    let redoStack = [];

    const fileInput = document.getElementById("fileInput");
    const drawing = document.getElementById("drawing");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const drawingArea = document.getElementById("drawingArea");
    const statusText = document.getElementById("status");
    const dataSelect = document.getElementById("dataSelect");
    const dataList = document.getElementById("dataList");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    renderDataControls();

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      clearAllPoints();

      if (file.type === "application/pdf") {
        loadPDF(file);
      } else if (file.type.startsWith("image/")) {
        loadImage(file);
      } else {
        alert("Please choose a PDF or image file.");
      }
    });

    function loadImage(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        drawing.src = e.target.result;
        drawing.style.display = "block";
        pdfCanvas.style.display = "none";
        statusText.textContent = "Image loaded.";
      };

      reader.readAsDataURL(file);
    }

    function loadPDF(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise
          .then(pdf => pdf.getPage(1))
          .then(page => {
            const scale = 4;
            const viewport = page.getViewport({ scale: scale });

            const context = pdfCanvas.getContext("2d");
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;

            drawing.style.display = "none";
            pdfCanvas.style.display = "block";

            page.render({
              canvasContext: context,
              viewport: viewport
            });

            statusText.textContent = "PDF page 1 loaded. High clarity mode.";
          });
      };

      reader.readAsArrayBuffer(file);
    }

    function renderDataControls() {
      dataList.innerHTML = "";
      dataSelect.innerHTML = "";

      dataTypes.forEach(dt => {
        const row = document.createElement("div");
        row.className = "dataRow";

        row.innerHTML = `
          Name:
          <input type="text" value="${dt.name}" onchange="renameDataType('${dt.id}', this.value)">
          Color:
          <input type="color" value="${dt.color}" onchange="changeDataColor('${dt.id}', this.value)">
        `;

        dataList.appendChild(row);

        const option = document.createElement("option");
        option.value = dt.id;
        option.textContent = dt.name;
        dataSelect.appendChild(option);
      });

      refreshPointStyles();
    }

    function addDataType() {
      const id = "data" + Date.now();
      dataTypes.push({
        id: id,
        name: "New Data",
        color: "#000000",
        counter: 1
      });

      renderDataControls();
    }

    function renameDataType(id, newName) {
      const dt = getDataType(id);
      if (!dt) return;
      dt.name = newName || "Unnamed";
      renderDataControls();
    }

    function changeDataColor(id, newColor) {
      const dt = getDataType(id);
      if (!dt) return;
      dt.color = newColor;
      refreshPointStyles();
    }

    function getDataType(id) {
      return dataTypes.find(dt => dt.id === id);
    }

    function setMode(newMode) {
      mode = newMode;
      selectedPoint = null;
      movingPoint = null;
      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));

      if (mode === "add") statusText.textContent = "Add mode: tap drawing to add points.";
      if (mode === "edit") statusText.textContent = "Edit mode: tap point to enter measurement.";
      if (mode === "move") statusText.textContent = "Move mode: tap point, then tap new location.";
      if (mode === "delete") statusText.textContent = "Delete mode: tap point to delete.";
    }

    drawingArea.addEventListener("click", function(event) {
      if (event.target.classList.contains("point")) return;

      const rect = drawingArea.getBoundingClientRect();
      const x = (event.clientX - rect.left) / zoomLevel;
      const y = (event.clientY - rect.top) / zoomLevel;

      if (mode === "add") {
        addPoint(x, y);
      }

      if (mode === "move" && movingPoint) {
        movePoint(movingPoint, x, y);
        movingPoint = null;
      }
    });

    function addPoint(x, y) {
      const dataId = dataSelect.value;
      const dt = getDataType(dataId);
      if (!dt) return;

      const point = {
        uid: Date.now() + Math.random(),
        dataId: dataId,
        number: dt.counter,
        x: x,
        y: y,
        measurement: "",
        moved: false
      };

      points.push(point);
      dt.counter++;

      undoStack.push({ type: "add", point: point });
      redoStack = [];

      createPointElement(point);
      statusText.textContent = dt.name + " point " + point.number + " added.";
    }

    function createPointElement(point) {
      const div = document.createElement("div");

      div.className = "point";
      div.dataset.uid = point.uid;
      div.textContent = point.measurement || point.number;

      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      const dt = getDataType(point.dataId);
      div.style.color = dt ? dt.color : "black";

      div.onclick = function(event) {
        event.stopPropagation();

        if (mode === "edit") {
          editPoint(point);
        } else if (mode === "move") {
          selectPointToMove(point, div);
        } else if (mode === "delete") {
          deletePoint(point);
        }
      };

      drawingArea.appendChild(div);
    }

    function editPoint(point) {
      const oldValue = point.measurement;

      const value = prompt(
        "Enter measurement for point " + point.number,
        point.measurement
      );

      if (value !== null) {
        point.measurement = value.trim();

        undoStack.push({
          type: "edit",
          point: point,
          oldValue: oldValue,
          newValue: point.measurement
        });

        redoStack = [];
        updatePointElement(point);
      }
    }

    function selectPointToMove(point, div) {
      movingPoint = point;
      document.querySelectorAll(".point").forEach(p => p.classList.remove("selected"));
      div.classList.add("selected");
      statusText.textContent = "Selected point " + point.number + ". Tap new location.";
    }

    function movePoint(point, newX, newY) {
      const oldX = point.x;
      const oldY = point.y;

      point.x = newX;
      point.y = newY;
      point.moved = true;

      undoStack.push({
        type: "move",
        point: point,
        oldX: oldX,
        oldY: oldY,
        newX: newX,
        newY: newY
      });

      redoStack = [];
      updatePointElement(point);
      statusText.textContent = "Point moved. CSV will include warning.";
    }

    function deletePoint(point) {
      const ok = confirm("Delete this point?");
      if (!ok) return;

      points = points.filter(p => p.uid !== point.uid);
      removePointElement(point.uid);

      undoStack.push({ type: "delete", point: point });
      redoStack = [];

      statusText.textContent = "Point deleted.";
    }

    function updatePointElement(point) {
      const element = document.querySelector(`[data-uid="${point.uid}"]`);
      if (!element) return;

      const dt = getDataType(point.dataId);

      element.textContent = point.measurement || point.number;
      element.style.left = point.x + "px";
      element.style.top = point.y + "px";
      element.style.color = dt ? dt.color : "black";
      element.classList.remove("selected");
    }

    function removePointElement(uid) {
      const element = document.querySelector(`[data-uid="${uid}"]`);
      if (element) element.remove();
    }

    function refreshPointStyles() {
      points.forEach(updatePointElement);
    }

    function undo() {
      const action = undoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter--;
      }

      if (action.type === "edit") {
        action.point.measurement = action.oldValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.oldX;
        action.point.y = action.oldY;
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points.push(action.point);
        createPointElement(action.point);
      }

      redoStack.push(action);
    }

    function redo() {
      const action = redoStack.pop();
      if (!action) return;

      if (action.type === "add") {
        points.push(action.point);
        createPointElement(action.point);
        const dt = getDataType(action.point.dataId);
        if (dt) dt.counter++;
      }

      if (action.type === "edit") {
        action.point.measurement = action.newValue;
        updatePointElement(action.point);
      }

      if (action.type === "move") {
        action.point.x = action.newX;
        action.point.y = action.newY;
        action.point.moved = true;
        updatePointElement(action.point);
      }

      if (action.type === "delete") {
        points = points.filter(p => p.uid !== action.point.uid);
        removePointElement(action.point.uid);
      }

      undoStack.push(action);
    }

    function zoomIn() {
      zoomLevel += 0.1;
      applyZoom();
    }

    function zoomOut() {
      if (zoomLevel > 0.3) {
        zoomLevel -= 0.1;
        applyZoom();
      }
    }

    function applyZoom() {
      drawingArea.style.transform = "scale(" + zoomLevel + ")";
      statusText.textContent = "Zoom: " + Math.round(zoomLevel * 100) + "%";
    }

    function cleanCSV(value) {
      return '"' + String(value || "").replace(/"/g, '""') + '"';
    }

    function exportCSV() {
      let fileName = prompt("Enter CSV file name:", "measurements");
      if (!fileName) return;

      if (!fileName.endsWith(".csv")) {
        fileName += ".csv";
      }

      const grouped = {};
      dataTypes.forEach(dt => grouped[dt.id] = []);

      points.forEach(p => {
        if (grouped[p.dataId]) grouped[p.dataId].push(p);
      });

      const maxRows = Math.max(...dataTypes.map(dt => grouped[dt.id].length), 0);

      let headers = [];

      dataTypes.forEach(dt => {
        headers.push(dt.name + " Seq");
        headers.push(dt.name + " Measurement");
        headers.push(dt.name + " Warning");
      });

      let csv = headers.map(cleanCSV).join(",") + "\n";

      for (let i = 0; i < maxRows; i++) {
        const row = [];

        dataTypes.forEach(dt => {
          const p = grouped[dt.id][i];

          if (p) {
            row.push(p.number);
            row.push(p.measurement);
            row.push(p.moved ? "WARNING: point moved, check sequence/order" : "");
          } else {
            row.push("");
            row.push("");
            row.push("");
          }
        });

        csv += row.map(cleanCSV).join(",") + "\n";
      }

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }

    function exportPDF() {
      let fileName = prompt("Enter PDF file name:", "marked_drawing");
      if (!fileName) return;

      if (!fileName.endsWith(".pdf")) {
        fileName += ".pdf";
      }

      const originalTransform = drawingArea.style.transform;
      drawingArea.style.transform = "scale(1)";

      const options = {
        margin: 0,
        filename: fileName,
        image: { type: "jpeg", quality: 1 },
        html2canvas: { scale: 4 },
        jsPDF: {
          unit: "px",
          format: [drawingArea.offsetWidth, drawingArea.offsetHeight],
          orientation: drawingArea.offsetWidth > drawingArea.offsetHeight ? "landscape" : "portrait"
        }
      };

      html2pdf().set(options).from(drawingArea).save().then(() => {
        drawingArea.style.transform = originalTransform;
      });
    }

    function clearAllPoints() {
      points = [];
      undoStack = [];
      redoStack = [];
      selectedPoint = null;
      movingPoint = null;
      zoomLevel = 1;
      drawingArea.style.transform = "scale(1)";

      dataTypes.forEach(dt => dt.counter = 1);
      document.querySelectorAll(".point").forEach(p => p.remove());
    }
  </script>

</body>
</html>

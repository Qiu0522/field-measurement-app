<!DOCTYPE html>
<html>
<head>
  <title>Field Measurement App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    #toolbar {
      padding: 10px;
      background: #eee;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #drawingArea {
      position: relative;
      display: inline-block;
      border: 1px solid #ccc;
      margin: 10px;
    }

    #drawing, #pdfCanvas {
      display: block;
      max-width: none;
    }

    .point {
      position: absolute;
      width: 26px;
      height: 26px;
      background: red;
      border-radius: 50%;
      color: white;
      text-align: center;
      line-height: 26px;
      font-size: 12px;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .done {
      background: green;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <input type="file" id="fileInput" accept="image/*,.pdf">
    <button onclick="addPointMode()">Add Points</button>
    <button onclick="exportCSV()">Export CSV</button>
    <span id="status">Choose a PDF or image first.</span>
  </div>

  <div id="drawingArea">
    <img id="drawing" style="display:none;">
    <canvas id="pdfCanvas" style="display:none;"></canvas>
  </div>

  <script>
    let points = [];
    let addingPoints = false;
    let nextPointId = 1;

    const fileInput = document.getElementById("fileInput");
    const drawing = document.getElementById("drawing");
    const pdfCanvas = document.getElementById("pdfCanvas");
    const drawingArea = document.getElementById("drawingArea");
    const statusText = document.getElementById("status");

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    fileInput.addEventListener("change", function(event) {
      const file = event.target.files[0];
      if (!file) return;

      clearOldPoints();

      if (file.type === "application/pdf") {
        loadPDF(file);
      } else if (file.type.startsWith("image/")) {
        loadImage(file);
      } else {
        alert("Please choose a PDF or image file.");
      }
    });

    function loadImage(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        drawing.src = e.target.result;
        drawing.style.display = "block";
        pdfCanvas.style.display = "none";
        statusText.textContent = "Image loaded. Click Add Points to start.";
      };

      reader.readAsDataURL(file);
    }

    function loadPDF(file) {
      const reader = new FileReader();

      reader.onload = function(e) {
        const typedArray = new Uint8Array(e.target.result);

        pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
          return pdf.getPage(1);
        }).then(function(page) {
          const scale = 2;
          const viewport = page.getViewport({ scale: scale });

          const context = pdfCanvas.getContext("2d");
          pdfCanvas.width = viewport.width;
          pdfCanvas.height = viewport.height;

          drawing.style.display = "none";
          pdfCanvas.style.display = "block";

          page.render({
            canvasContext: context,
            viewport: viewport
          });

          statusText.textContent = "PDF page 1 loaded. Click Add Points to start.";
        });
      };

      reader.readAsArrayBuffer(file);
    }

    function clearOldPoints() {
      points = [];
      nextPointId = 1;

      document.querySelectorAll(".point").forEach(p => p.remove());
    }

    function addPointMode() {
      addingPoints = true;
      statusText.textContent = "Tap on the drawing to add points.";
    }

    drawingArea.addEventListener("click", function(event) {
      if (!addingPoints) return;
      if (event.target.classList.contains("point")) return;

      const rect = drawingArea.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;

      const point = {
        id: nextPointId,
        x: x,
        y: y,
        measurement: ""
      };

      points.push(point);
      createPointElement(point);
      nextPointId++;
    });

    function createPointElement(point) {
      const div = document.createElement("div");

      div.className = "point";
      div.textContent = point.id;
      div.style.left = point.x + "px";
      div.style.top = point.y + "px";

      div.onclick = function(event) {
        event.stopPropagation();

        const value = prompt("Enter measurement for point " + point.id, point.measurement);

        if (value !== null && value.trim() !== "") {
          point.measurement = value.trim();
          div.classList.add("done");
        }
      };

      drawingArea.appendChild(div);
    }

    function exportCSV() {
      let fileName = prompt("Enter CSV file name:", "measurements");

      if (!fileName) return;

      if (!fileName.endsWith(".csv")) {
        fileName += ".csv";
      }

      let csv = "Sequence,Measurement\n";

      points.forEach(p => {
        csv += p.id + "," + p.measurement + "\n";
      });

      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
